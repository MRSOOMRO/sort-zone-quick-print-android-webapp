const SLACK_WEBHOOK_KEY = "SORT_ZONE_SLACK_WEBHOOK_URL";

/*

  Later, rotate/revoke it from Slack and use a safer backend/proxy.
*/
const DCE1_HARDCODED_SLACK_WEBHOOK_URL = "";

const CLUSTERS = "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("");
const ALL_SLOTS = ["A","B","C","D","E","F","G","H","J","K","L","M"];
const STORAGE_KEY = "szQuickPrintAndroid_v2";
const DB_NAME = "SortZoneQuickPrintDB";
const DB_VERSION = 1;
const STORE_NAME = "resources";
const STEM_COUNT_KEY = "STEM_ROW_COUNT";

const DEFAULT_CONFIG = {
  printers:{mode:"wifi",wifiIp:"",wifiPort:"9100",bluetooth:"",usb:""},
  clusters:{A:true,B:true,C:true,D:true},
  ranges:{A:{from:1,to:52},B:{from:1,to:52},C:{from:1,to:28},D:{from:29,to:56}},
  slotChars:{}
};

CLUSTERS.forEach(c => {
  if(DEFAULT_CONFIG.clusters[c] === undefined) DEFAULT_CONFIG.clusters[c] = false;
  if(!DEFAULT_CONFIG.ranges[c]) DEFAULT_CONFIG.ranges[c] = {from:1,to:56};
  DEFAULT_CONFIG.slotChars[c] = ["A","B","C","D","E","G","H","J"];
});

let config = loadConfig();

function loadConfig(){
  try{
    const saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || "{}");
    const cfg = JSON.parse(JSON.stringify(DEFAULT_CONFIG));
    Object.assign(cfg.printers, saved.printers || {});
    Object.assign(cfg.clusters, saved.clusters || {});
    Object.assign(cfg.ranges, saved.ranges || {});
    Object.assign(cfg.slotChars, saved.slotChars || {});
    return cfg;
  }catch(e){
    return JSON.parse(JSON.stringify(DEFAULT_CONFIG));
  }
}

function saveConfig(){
  localStorage.setItem(STORAGE_KEY, JSON.stringify(config));
}

function showToast(msg){
  const t = document.getElementById("toast");
  t.textContent = msg || "";
  t.classList.remove("hidden");
  clearTimeout(window.__toastTimer);
  window.__toastTimer = setTimeout(() => t.classList.add("hidden"), 2600);
}
window.showToast = showToast;

function normalizeLabel(value){
  return String(value || "").trim().toUpperCase();
}

function lookupKey(value){
  return normalizeLabel(value).replace(/[^A-Z0-9]/g, "");
}

function parseCsvLine(line){
  const out = [];
  let cur = "";
  let quote = false;

  for(let i = 0; i < line.length; i++){
    const ch = line[i];
    const next = line[i + 1];

    if(ch === '"' && quote && next === '"'){
      cur += '"';
      i++;
    }else if(ch === '"'){
      quote = !quote;
    }else if(ch === "," && !quote){
      out.push(cur.trim().replace(/^"|"$/g, ""));
      cur = "";
    }else{
      cur += ch;
    }
  }

  out.push(cur.trim().replace(/^"|"$/g, ""));
  return out.map(x => x.trim());
}

function sleep(ms){
  return new Promise(resolve => setTimeout(resolve, ms));
}

function openDb(){
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(DB_NAME, DB_VERSION);

    req.onupgradeneeded = event => {
      const db = event.target.result;
      if(!db.objectStoreNames.contains(STORE_NAME)){
        db.createObjectStore(STORE_NAME, { keyPath:"key" });
      }
    };

    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error || new Error("IndexedDB open failed"));
  });
}

async function clearResourceDb(){
  const db = await openDb();

  return new Promise((resolve, reject) => {
    const tx = db.transaction(STORE_NAME, "readwrite");
    tx.objectStore(STORE_NAME).clear();
    tx.oncomplete = () => resolve();
    tx.onerror = () => reject(tx.error || new Error("Clear failed"));
  });
}

async function saveResourceBatch(items){
  const db = await openDb();

  return new Promise((resolve, reject) => {
    const tx = db.transaction(STORE_NAME, "readwrite");
    const store = tx.objectStore(STORE_NAME);

    for(const item of items){
      store.put(item);
    }

    tx.oncomplete = () => resolve();
    tx.onerror = () => reject(tx.error || new Error("Batch save failed"));
  });
}

async function getResourceByKey(key){
  const db = await openDb();

  return new Promise((resolve, reject) => {
    const tx = db.transaction(STORE_NAME, "readonly");
    const req = tx.objectStore(STORE_NAME).get(key);

    req.onsuccess = () => resolve(req.result ? req.result.id : "");
    req.onerror = () => reject(req.error || new Error("Lookup failed"));
  });
}

async function findResource(label){
  const key = lookupKey(label);
  if(!key) return "";
  return await getResourceByKey(key);
}
window.findResource = findResource;

function updateStatus(){
  const count = Number(localStorage.getItem(STEM_COUNT_KEY) || "0");
  const el = document.getElementById("status");
  if(el) el.textContent = "STEM: " + count;
}
window.updateStatus = updateStatus;

async function processStemCsvText(text, sourceName){
  const cleanText = String(text || "").replace(/^\uFEFF/, "").replace(/\r/g, "");
  const lines = cleanText.split("\n").filter(x => x.trim());

  if(lines.length < 2){
    showToast("STEM CSV file is empty");
    return;
  }

  const header = parseCsvLine(lines[0]).map(x => x.trim().toLowerCase());

  let labelIndex = header.indexOf("resource label");
  let idIndex = header.indexOf("resource id");

  if(labelIndex < 0) labelIndex = header.findIndex(x => x.includes("resource") && x.includes("label"));
  if(idIndex < 0) idIndex = header.findIndex(x => x.includes("resource") && x.includes("id"));

  if(labelIndex < 0 || idIndex < 0){
    showToast("CSV needs Resource Label and Resource Id columns");
    return;
  }

  showToast("Clearing old STEM...");
  await clearResourceDb();

  localStorage.removeItem("RESOURCE_MAP");
  localStorage.removeItem("RESOURCE_MAP_COMPACT");

  let count = 0;
  let batch = [];
  const BATCH_SIZE = 500;

  for(let i = 1; i < lines.length; i++){
    const row = parseCsvLine(lines[i]);

    if(row.length <= Math.max(labelIndex, idIndex)) continue;

    const label = row[labelIndex] || "";
    const id = row[idIndex] || "";
    const key = lookupKey(label);

    if(key && String(id).trim()){
      batch.push({
        key: key,
        id: String(id).trim()
      });

      count++;
    }

    if(batch.length >= BATCH_SIZE){
      await saveResourceBatch(batch);
      batch = [];

      if(count % 5000 === 0){
        showToast(sourceName + ": " + count + " rows...");
        await sleep(40);
      }else{
        await sleep(0);
      }
    }
  }

  if(batch.length){
    await saveResourceBatch(batch);
  }

  if(!count){
    showToast("No Resource IDs found in CSV");
    return;
  }

  localStorage.setItem(STEM_COUNT_KEY, String(count));
  updateStatus();
  showToast("Imported " + count + " STEM rows");
}

async function importRepoStem(){
  try{
    showToast("Loading DCE1 STEM from repo...");

    const url = REPO_STEM_URL + "?v=" + Date.now();
    const res = await fetch(url, { cache:"no-store" });

    if(!res.ok){
      showToast("Repo STEM failed: HTTP " + res.status);
      return;
    }

    const text = await res.text();
    await processStemCsvText(text, "Repo STEM");
  }catch(e){
    showToast("Repo STEM failed: " + (e && e.message ? e.message : e));
  }
}

async function importLocalStem(){
  const input = document.createElement("input");
  input.type = "file";
  input.accept = ".csv,text/csv";

  input.onchange = async () => {
    const file = input.files && input.files[0];
    if(!file) return;

    const name = String(file.name || "").toLowerCase();

    if(!name.endsWith(".csv")){
      showToast("Only CSV files are allowed. Export Resource Management as .csv");
      return;
    }

    try{
      showToast("Reading local CSV...");
      const text = await file.text();
      await processStemCsvText(text, "Local CSV");
    }catch(e){
      showToast("Import failed: " + (e && e.message ? e.message : e));
    }
  };

  input.click();
}

async function importStemFile(){
  const useRepo = confirm(
    "Import STEM Data\n\nOK = Load DCE1 STEM data from Server\nCancel = Upload local CSV"
  );

  if(useRepo){
    await importRepoStem();
  }else{
    await importLocalStem();
  }
}
window.importStemFile = importStemFile;

function getSlackWebhookUrl(){
  const hardcoded = String(DCE1_HARDCODED_SLACK_WEBHOOK_URL || "").trim();
  const saved = String(localStorage.getItem(SLACK_WEBHOOK_KEY) || "").trim();

  if(
    hardcoded &&
    !hardcoded.includes("PASTE_YOUR_SLACK_WEBHOOK_URL_HERE") &&
    hardcoded.startsWith("https://")
  ){
    return hardcoded;
  }

  if(saved && saved.startsWith("https://")){
    return saved;
  }

  return "";
}

function saveSlackWebhookUrl(){
  const input = document.getElementById("slackWebhookUrl");
  if(!input) return;

  const value = input.value.trim();

  if(!value){
    localStorage.removeItem(SLACK_WEBHOOK_KEY);
    showToast("Webhook/relay URL cleared");
    return;
  }

  if(!value.startsWith("https://")){
    showToast("Invalid URL");
    return;
  }

  localStorage.setItem(SLACK_WEBHOOK_KEY, value);
  showToast("Webhook/relay URL saved");
}
 let qrScanStream = null;
let qrScanTimer = null;

function createQrScannerOverlay(){
  let overlay = document.getElementById("qrScannerOverlay");

  if(overlay) return overlay;

  overlay = document.createElement("div");
  overlay.id = "qrScannerOverlay";
  overlay.className = "setup-overlay hidden";
  overlay.innerHTML = `
    <div class="preview-panel">
      <div class="setup-header">
        <span style="font-size:24px;">Scan Webhook QR</span>
        <button id="closeQrScanner">x</button>
      </div>
      <video id="qrScannerVideo" playsinline style="width:100%;border-radius:12px;background:#000;"></video>
      <canvas id="qrScannerCanvas" class="hidden"></canvas>
      <button id="manualQrClose" class="btn-grey" style="width:100%;margin-top:10px;">Cancel</button>
    </div>
  `;

  document.body.appendChild(overlay);

  document.getElementById("closeQrScanner").onclick = stopWebhookQrScan;
  document.getElementById("manualQrClose").onclick = stopWebhookQrScan;

  return overlay;
}

async function startWebhookQrScan(){
  if(typeof jsQR === "undefined"){
    showToast("QR scanner not loaded. Check internet.");
    return;
  }

  const overlay = createQrScannerOverlay();
  const video = document.getElementById("qrScannerVideo");

  try{
    overlay.classList.remove("hidden");
    showToast("Opening camera...");

    qrScanStream = await navigator.mediaDevices.getUserMedia({
      video: {
        facingMode: "environment"
      },
      audio: false
    });

    video.srcObject = qrScanStream;
    await video.play();

    showToast("Scan webhook QR code");

    scanQrFrame();
  }catch(e){
    showToast("Camera not available. Use manual paste.");
    stopWebhookQrScan();
  }
}

function scanQrFrame(){
  const video = document.getElementById("qrScannerVideo");
  const canvas = document.getElementById("qrScannerCanvas");

  if(!video || !canvas || !qrScanStream) return;

  const ctx = canvas.getContext("2d");

  if(video.readyState === video.HAVE_ENOUGH_DATA){
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;

    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

    const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
    const result = jsQR(imageData.data, imageData.width, imageData.height);

    if(result && result.data){
      const scannedUrl = String(result.data || "").trim();

      if(scannedUrl.startsWith("https://hooks.slack.com/")){
        document.getElementById("slackWebhookUrl").value = scannedUrl;
        localStorage.setItem(SLACK_WEBHOOK_KEY, scannedUrl);
        showToast("Webhook URL scanned and saved");
        stopWebhookQrScan();
        return;
      }

      showToast("QR found, but not Slack webhook URL");
    }
  }

  qrScanTimer = requestAnimationFrame(scanQrFrame);
}

function stopWebhookQrScan(){
  const overlay = document.getElementById("qrScannerOverlay");

  if(qrScanTimer){
    cancelAnimationFrame(qrScanTimer);
    qrScanTimer = null;
  }

  if(qrScanStream){
    qrScanStream.getTracks().forEach(track => track.stop());
    qrScanStream = null;
  }

  if(overlay){
    overlay.classList.add("hidden");
  }
} 
function ensureSlackSetupUi(){
  if(document.getElementById("slackWebhookUrl")) return;

  const setupPanel = document.querySelector(".setup-panel");
  const setupActions = document.querySelector(".setup-row[style*='display:flex']");

  if(!setupPanel || !setupActions) return;

  const row = document.createElement("div");
  row.className = "setup-row";
  row.innerHTML = `
    <label>Slack Webhook URL</label>
    <input id="slackWebhookUrl" type="password" placeholder="Paste Slack webhook URL">
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:6px;">
      <button id="scanSlackWebhook" class="btn-grey">Scan QR Webhook</button>
      <button id="saveSlackWebhook" class="btn-primary">Save Webhook URL</button>
    </div>
  `;

  setupPanel.insertBefore(row, setupActions);

  document.getElementById("slackWebhookUrl").value =
    localStorage.getItem(SLACK_WEBHOOK_KEY) || "";

  document.getElementById("saveSlackWebhook").onclick = saveSlackWebhookUrl;
  document.getElementById("scanSlackWebhook").onclick = startWebhookQrScan;
}

async function notifyMissingLabel(label){
  const webhookUrl = getSlackWebhookUrl();

  if(!webhookUrl){
    showToast("Slack URL missing. Add it in Setup.");
    openSetup();
    return;
  }

  label = String(label || "").trim();

  if(!label){
    showToast("Label missing. Please reopen preview.");
    return;
  }

  const message =
  `Hey Team 👋 Sort Zone Label for *"${label}"* is reported missing or damaged, ` +
  `Please take action accordingly - Thank You :slightly_smiling_face: <!here>`;

  const btn = document.getElementById("notifyMissingLabelBtn");

  try{
    if(btn){
      btn.disabled = true;
      btn.textContent = "Sending...";
    }

    showToast("Sending Slack notification for " + label + "...");

    await fetch(webhookUrl, {
      method: "POST",
      mode: "no-cors",
      body: JSON.stringify({
        text: message
      })
    });

    showToast("Request sent for " + label + ". Check Slack.");

    if(btn){
      btn.textContent = "Request Sent ✅";
      setTimeout(() => {
        btn.disabled = false;
        btn.textContent = "Notify Missing Label 🔔";
      }, 2500);
    }
  }catch(e){
    showToast("Request failed");

    if(btn){
      btn.disabled = false;
      btn.textContent = "Notify Missing Label 🔔";
    }
  }
}

function ensureNotifyButton(label){
  let btn = document.getElementById("notifyMissingLabelBtn");

  if(!btn){
    btn = document.createElement("button");
    btn.id = "notifyMissingLabelBtn";
    btn.textContent = "Notify Missing Label 🔔";
    btn.className = "btn-primary";
    btn.style.width = "100%";
    btn.style.marginTop = "8px";
    btn.style.minHeight = "46px";
    btn.style.borderRadius = "8px";
    btn.style.background = "#4472c4";
    btn.style.color = "white";
    btn.style.fontSize = "18px";
    btn.style.fontWeight = "900";

    const actions = document.querySelector(".preview-actions");
    const panel = document.querySelector(".preview-panel");

    if(actions){
      actions.insertAdjacentElement("afterend", btn);
    }else if(panel){
      panel.appendChild(btn);
    }
  }

 btn.onclick = () => notifyMissingLabel(label);
}

function renderQuickHome(){
  updateStatus();

  const body = document.getElementById("body");
  const grid = document.createElement("div");
  grid.className = "cluster-grid";

  CLUSTERS.forEach(c => {
    if(!config.clusters[c]) return;

    const d = document.createElement("div");
    d.className = "cluster-tile cluster-" + c;
    d.textContent = c;
    d.onclick = () => renderAisles(c);
    grid.appendChild(d);
  });

  const row = document.createElement("div");
  row.className = "search-row";

  const input = document.createElement("input");
  input.placeholder = "Type label ID, example A1-1A";
  input.oninput = () => {
    input.value = input.value.toUpperCase().replace(/\s+/g, "");
  };

  const btn = document.createElement("button");
  btn.className = "btn-primary";
  btn.textContent = "Preview";
  btn.onclick = () => input.value && showStandaloneLabel(input.value);

  row.appendChild(input);
  row.appendChild(btn);

  body.innerHTML = "";

  if(!window.navigator.standalone){
    const help = document.createElement("div");
    help.className = "install-help";
    help.textContent = "iPhone: open in Safari, tap Share, then Add to Home Screen.";
    body.appendChild(help);
  }

  body.appendChild(grid);
  body.appendChild(row);
}

function renderAisles(cluster){
  const body = document.getElementById("body");

  const title = document.createElement("div");
  title.className = "section-title";
  title.textContent = "Cluster " + cluster;

  const grid = document.createElement("div");
  grid.className = "aisle-grid";

  const range = config.ranges[cluster] || {from:1,to:56};

  for(let i = Number(range.from) || 1; i <= (Number(range.to) || 56); i++){
    const tile = document.createElement("div");
    tile.className = "aisle-tile";
    tile.textContent = cluster + i;
    tile.onclick = () => renderSlots(cluster, i);
    grid.appendChild(tile);
  }

  const nav = document.createElement("div");
  nav.className = "nav-row";

  const back = document.createElement("button");
  back.className = "btn-grey";
  back.style.flex = "1";
  back.textContent = "Back";
  back.onclick = renderQuickHome;

  nav.appendChild(back);

  body.innerHTML = "";
  body.appendChild(title);
  body.appendChild(grid);
  body.appendChild(nav);
}

function getSlotChars(cluster){
  return config.slotChars[cluster] && config.slotChars[cluster].length ? config.slotChars[cluster] : ALL_SLOTS;
}

function renderSlots(cluster, aisle){
  const body = document.getElementById("body");

  const title = document.createElement("div");
  title.className = "section-title";
  title.textContent = cluster + aisle;

  const slots = getSlotChars(cluster);

  const grid = document.createElement("div");
  grid.className = "slot-grid";
  grid.style.setProperty("--slot-cols", String(window.innerHeight > window.innerWidth ? 4 : Math.min(slots.length, 8)));

  if(window.innerHeight > window.innerWidth){
    ["A","B","C","D","E","F","G","H","J","K","L","M"]
      .filter(x => slots.includes(x))
      .forEach(letter => {
        ["1","2","3","4"].forEach(row => {
          const label = cluster + aisle + "-" + row + letter;
          const tile = document.createElement("div");
          tile.className = "slot-tile";
          tile.textContent = label;
          tile.onclick = () => previewLabel(label, false);
          grid.appendChild(tile);
        });
      });
  }else{
    ["4","3","2","1"].forEach(row => {
      slots.forEach(letter => {
        const label = cluster + aisle + "-" + row + letter;
        const tile = document.createElement("div");
        tile.className = "slot-tile";
        tile.textContent = label;
        tile.onclick = () => previewLabel(label, false);
        grid.appendChild(tile);
      });
    });
  }

  const ovRow = document.createElement("div");
  ovRow.className = "ov-row";

  ["P","T","W","Y","R","U","X","Z"].forEach(letter => {
    const label = cluster + aisle + "-" + letter;
    const tile = document.createElement("div");
    tile.className = "ov-btn";
    tile.textContent = label;
    tile.onclick = () => previewLabel(label, true);
    ovRow.appendChild(tile);
  });

  const box = document.createElement("div");
  box.id = "labelBox";
  box.className = "label-box";
  box.textContent = "Tap a label to preview";

  const nav = document.createElement("div");
  nav.className = "nav-row";

  const back = document.createElement("button");
  back.className = "btn-grey";
  back.style.flex = "1";
  back.textContent = "Back";
  back.onclick = () => renderAisles(cluster);

  nav.appendChild(back);

  body.innerHTML = "";
  body.appendChild(title);
  body.appendChild(grid);
  body.appendChild(ovRow);
  body.appendChild(box);
  body.appendChild(nav);
}

async function previewLabel(label, ov){
  const resourceId = await findResource(label);
  const data = resourceId || label;
  const qr = QR_BASE + "?size=220x220&data=" + encodeURIComponent(data);

  document.getElementById("previewTitle").textContent = label;
  document.getElementById("previewSub").textContent = resourceId ? "Resource ID: " + resourceId : "No Resource ID found for " + label;
  document.getElementById("previewQr").src = qr;

  const sendBtn = document.getElementById("previewSend");
  sendBtn.textContent = resourceId ? "Print Label" : "Import STEM first";
  sendBtn.onclick = () => {
    if(!resourceId) return showToast("No Resource Id found for " + label);
    showToast("Leave it with Imran, he will do some magic to enable printing through phone");
  };

  ensureNotifyButton(label);

  document.getElementById("previewOverlay").classList.remove("hidden");
}
window.previewLabel = previewLabel;

function closePreview(){
  document.getElementById("previewOverlay").classList.add("hidden");
}

function showStandaloneLabel(label){
  previewLabel(label, false);
}

  document.getElementById("setupOverlay").classList.remove("hidden");

}

function closeSetup(){
  document.getElementById("setupOverlay").classList.add("hidden");

function populatePrinterLists(){}

function populateClusters(){
  const wrap = document.getElementById("clusterChecks");
  wrap.innerHTML = "";

  CLUSTERS.forEach(c => {
    const label = document.createElement("label");
    label.innerHTML = `<input type="checkbox" id="chk${c}" ${config.clusters[c] ? "checked" : ""}> ${c}`;
    wrap.appendChild(label);
  });
}

function renderRanges(){
  const box = document.getElementById("rangeBox");
  box.innerHTML = "";

  CLUSTERS.forEach(c => {
    const r = config.ranges[c] || {from:1,to:56};
    const row = document.createElement("div");
    row.className = "range-row";
    row.innerHTML = `<b>${c}</b><input id="r${c}f" value="${r.from}"><input id="r${c}t" value="${r.to}">`;
    box.appendChild(row);
  });
}

function renderSlotCharConfig(){
  const container = document.getElementById("slotCharsConfig");
  container.innerHTML = "<label>Bag locations by cluster</label>";

  CLUSTERS.forEach(c => {
    const section = document.createElement("div");
    section.className = "slot-char-row";

    const current = getSlotChars(c);

    section.innerHTML =
      `<b>Cluster ${c}</b><div class="slot-char-selector">` +
      ALL_SLOTS.map(ch => `<label><input type="checkbox" id="slot${c}${ch}" ${current.includes(ch) ? "checked" : ""}> ${ch}</label>`).join("") +
      `</div>`;

    container.appendChild(section);
  });
}

function saveSetup(){
  CLUSTERS.forEach(c => {
    config.clusters[c] = document.getElementById("chk" + c).checked;

    config.ranges[c] = {
      from:Number(document.getElementById("r" + c + "f").value) || 1,
      to:Number(document.getElementById("r" + c + "t").value) || 56
    };

    const selected = ALL_SLOTS.filter(ch => document.getElementById("slot" + c + ch).checked);
    config.slotChars[c] = selected.length ? selected : ["A"];
  });

  saveConfig();
  closeSetup();
  renderQuickHome();
  showToast("Settings saved");
}
